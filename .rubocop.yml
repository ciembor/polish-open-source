plugins:
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - "vendor/**/*"
    - "coverage/**/*"
    - "tmp/**/*"

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "lib/polish_github_rank/web/app.rb"

Metrics/AbcSize:
  Max: 30

Metrics/ClassLength:
  Max: 350

Metrics/MethodLength:
  Max: 20
  Exclude:
    - "spec/**/*"

Metrics/ParameterLists:
  Max: 6

RSpec/ExampleLength:
  Max: 25

RSpec/MultipleExpectations:
  Max: 10

RSpec/InstanceVariable:
  Enabled: false

RSpec/LeakyConstantDeclaration:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false
