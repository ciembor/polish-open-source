pl:
  about:
    author:
      body: "Programista i autor projektu. Buduję narzędzia, aplikacje i projekty open source, które porządkują dane i ułatwiają odkrywanie wartościowej pracy technicznej."
      eyebrow: "Autor"
    hero:
      eyebrow: "O projekcie"
      lede: "Ranking pokazuje publiczną pracę osób związanych z Polską na platformach open source."
    mission:
      body: "Celem projektu jest docenianie programistek i programistów zasłużonych dla open source oraz zachęcanie do tworzenia wolnego oprogramowania. Ranking ma ułatwiać odkrywanie aktywnych osób, repozytoriów i lokalnych społeczności technicznych."
      eyebrow: "Misja"
      title: "Promować ludzi, którzy budują wolne oprogramowanie"
    platforms:
      eyebrow: "Wspierane platformy"
      title: "Publiczne źródła rankingu"
    rules:
      activity:
        body: "Ranking aktywności użytkowników liczy publiczne zdarzenia z danego miesiąca. Prywatna aktywność, prywatne commity i niepubliczne projekty nie są uwzględniane."
        title: "Aktywność"
      data_scope:
        body: "Używane są wyłącznie dane publiczne udostępniane przez API GitHuba, GitLaba i Codeberga. Projekt nie czyta prywatnych repozytoriów, prywatnej aktywności ani danych niewidocznych publicznie."
        title: "Zakres danych"
      eyebrow: "Zasady"
      snapshots:
        body: "Dane są odświeżane miesięcznie. Widok najnowszy przełącza się dopiero po zakończeniu pełnego crawlowania, a jawny adres miesiąca może pokazywać dane już w trakcie przeliczania."
        title: "Snapshoty"
      stars:
        body: "Ranking top sortuje użytkowników według łącznej liczby gwiazdek w publicznych repozytoriach, a repozytoria według aktualnej liczby gwiazdek."
        title: "Top według gwiazdek"
      title: "Jak powstają rankingi"
      trending:
        body: "Ranking trending pokazuje przyrost gwiazdek w danym miesiącu. Dla platform, które nie udostępniają publicznej historii gwiazdek w potrzebnej postaci, miesięczny przyrost jest traktowany jako niedostępny."
        title: "Trending"
      users:
        body: "Osoby są wyszukiwane po publicznych lokalizacjach związanych z Polską i polskimi miastami. Do rankingu trafiają profile, których publiczna lokalizacja pasuje do obsługiwanego kraju albo miasta."
        title: "Użytkownicy"
    seo:
      description: "Misja, zasady generowania rankingów i wspierane platformy Polish Open Source Rank."
    title: "O Polish Open Source Rank"
