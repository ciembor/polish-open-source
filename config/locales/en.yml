      activity:
        body: "The activity ranking counts public events from the given month. Private activity, private commits and non-public projects are not included."
        title: "Activity"
      data_scope:
        body: "Only public data exposed by the GitHub, GitLab and Codeberg APIs is used. The project does not read private repositories, private activity or data that is not publicly visible."
        title: "Data scope"
      eyebrow: "Rules"
      snapshots:
        body: "Data is refreshed monthly. The latest view switches only after a full crawl completes, while an explicit month URL may show data while recalculation is still running."
        title: "Snapshots"
      stars:
        body: "The top ranking sorts users by the total number of stars in public repositories, and repositories by their current star count."
        title: "Top by stars"
      title: "How rankings are built"
      trending:
        body: "The trending ranking shows the star increase in a given month. For platforms that do not expose public star history in the needed form, the monthly increase is treated as unavailable."
        title: "Trending"
      users:
        body: "People are found through public locations connected with Poland and Polish cities. Profiles enter the ranking when their public location matches a supported country or city."
        title: "Users"
    seo:
      title: "About Polish Open Source Rank"
      description: "Mission, ranking rules for open-source work in Poland, and the supported GitHub, GitLab, and Codeberg platforms."
