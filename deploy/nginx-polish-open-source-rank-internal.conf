# Install this snippet inside the `polish-open-source.pl` TLS server block,
# before the generic `location /` proxy.
location ^~ /internal/ {
    auth_basic "Polish Open Source operations";
    auth_basic_user_file /etc/nginx/.htpasswd-polish-open-source-rank;

    limit_req zone=per_ip burst=30 nodelay;
    limit_req zone=crawlers burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:9293;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
