name: Deploy to server

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: maciej-ciemborowicz.eu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Cache RuboCop
        uses: actions/cache@v5
        with:
          path: tmp/rubocop_cache
          key: rubocop-${{ runner.os }}-${{ hashFiles('Gemfile.lock', '.rubocop.yml') }}
          restore-keys: |
            rubocop-${{ runner.os }}-

      - name: Quality
        env:
          KNAPSACK_NODES: "2"
        run: bin/quality

      - name: Setup SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keygen -lf ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          REMOTE_HOST: ciembor@${{ env.DEPLOY_HOST }}
        run: scripts/deploy.sh
        shell: bash
