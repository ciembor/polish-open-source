name: CI and deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      action:
        description: Deploy the current master image or roll back one version
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Cache RuboCop
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tmp/rubocop_cache
          key: rubocop-${{ runner.os }}-${{ hashFiles('Gemfile.lock', '.rubocop.yml') }}
          restore-keys: |
            rubocop-${{ runner.os }}-

      - name: Quality
        env:
          KNAPSACK_NODES: "2"
        run: bin/quality

  dependency-security:
    name: Dependency security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Audit Ruby dependencies
        run: bundle exec bundle-audit check --update

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        with:
          languages: ruby

      - name: Analyze
        uses: github/codeql-action/analyze@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4

  container-smoke:
    name: Container smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Build production image
        run: docker build --pull -t polish-open-source-rank:ci .

      - name: Smoke test production container
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p tmp/container-smoke/db tmp/container-smoke/log
          chmod 0777 tmp/container-smoke/db tmp/container-smoke/log

          docker run --rm -d \
            --name polish-open-source-rank-smoke \
            -p 127.0.0.1:9293:9293 \
            -e RACK_ENV=production \
            -e APP_BASE_PATH=/ \
            -e BASE_URL=http://127.0.0.1:9293 \
            -e SESSION_SECRET=container-smoke-session-secret-for-polish-open-source-rank-ci-2026 \
            -e INTERNAL_BASIC_AUTH_USERNAME=container-smoke-ops \
            -e INTERNAL_BASIC_AUTH_PASSWORD=container-smoke-internal-basic-auth-secret \
            -e GITHUB_TOKEN=container-smoke-github-token \
            -e GITHUB_OAUTH_CLIENT_ID=container-smoke-github-client \
            -e GITHUB_OAUTH_CLIENT_SECRET=container-smoke-github-secret \
            -e DISCORD_OAUTH_CLIENT_ID=container-smoke-discord-client \
            -e DISCORD_OAUTH_CLIENT_SECRET=container-smoke-discord-secret \
            -e DISCORD_BOT_TOKEN=container-smoke-discord-token \
            -e DISCORD_GUILD_ID=1 \
            -e DISCORD_INVITE_CHANNEL_ID=1 \
            -v "$PWD/tmp/container-smoke/db:/app/db" \
            -v "$PWD/tmp/container-smoke/log:/app/log" \
            polish-open-source-rank:ci

          cleanup() {
            docker rm -f polish-open-source-rank-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9293/healthz; then
              docker exec polish-open-source-rank-smoke ruby -e 'abort("container must not run as root") if Process.uid.zero?'
              docker exec polish-open-source-rank-smoke ruby -e 'abort("runtime dirs are not writable") unless %w[/app/db /app/log /app/tmp].all? { |path| File.writable?(path) }'
              exit 0
            fi
            sleep 2
          done

          docker logs polish-open-source-rank-smoke
          exit 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - quality
      - dependency-security
      - codeql
      - container-smoke
    env:
      DEPLOY_HOST: maciej-ciemborowicz.eu

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup SSH
        shell: bash
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keygen -lf ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh-keygen -F "${DEPLOY_HOST}" -f ~/.ssh/known_hosts >/dev/null

      - name: Deploy or rollback
        env:
          REMOTE_HOST: ciembor@${{ env.DEPLOY_HOST }}
          DEPLOY_ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'deploy' }}
        run: scripts/deploy.sh "$DEPLOY_ACTION"
        shell: bash
